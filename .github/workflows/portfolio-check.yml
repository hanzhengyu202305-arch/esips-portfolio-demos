name: portfolio-check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install portfolio test dependencies
        run: python -m pip install -e aegisops-agent -e kube-copilot
      - name: Run portfolio validation
        run: make portfolio-check AEGISOPS_PY=python
