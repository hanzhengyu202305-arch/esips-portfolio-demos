apiVersion: apps/v1
kind: Deployment
metadata:
  name: ore-api
spec:
  replicas: 3
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ore-api
          image: ghcr.io/example/ore-api:1.2.0
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
